<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản Phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-container { margin-bottom: 20px; }
        .form-container input { padding: 5px; margin-right: 5px; }
        #btn-add { padding: 6px 15px; cursor: pointer; }
        
        #product-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        #product-table th, #product-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        #product-table th { background-color: #f4f4f4; }
        
        #sort-name { cursor: pointer; }
        #sort-name:hover { background-color: #e0e0e0; }
        
        #product-table tbody tr:nth-child(even) { background-color: #f9f9f9; }
        #product-table tbody tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div class="form-container">
        <input type="text" id="input-name" placeholder="Tên sản phẩm">
        <input type="text" id="input-category" placeholder="Danh mục">
        <input type="number" id="input-price" placeholder="Đơn giá">
        <input type="number" id="input-quantity" placeholder="Số lượng">
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="sort-name">Tên sản phẩm</th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        let products = [];
        let sortAscending = true; 
        const xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                products = JSON.parse(xhr.responseText);
                renderTable();
            }
        };
        xhr.open('GET', 'products.json');
        xhr.send();

        function renderTable() {
            const tbody = document.querySelector('#product-table tbody');
            tbody.innerHTML = ''; 

            products.forEach((product, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.category || ''}</td>
                    <td>${product.price}</td>
                    <td>${product.quantity}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('btn-add').addEventListener('click', function() {
            const nameEl = document.getElementById('input-name');
            const categoryEl = document.getElementById('input-category');
            const priceEl = document.getElementById('input-price');
            const quantityEl = document.getElementById('input-quantity');

            const name = nameEl.value.trim();
            const category = categoryEl.value.trim();
            const price = parseFloat(priceEl.value);
            const quantity = parseInt(quantityEl.value);

            if (name.length < 3 || isNaN(price) || price <= 0 || isNaN(quantity) || quantity < 1) {
                alert('Vui lòng nhập đúng định dạng!');
                return;
            }

            products.push({
                id: Date.now(),
                name: name,
                category: category,
                price: price,
                quantity: quantity
            });

            renderTable();

            // Reset form
            nameEl.value = '';
            categoryEl.value = '';
            priceEl.value = '';
            quantityEl.value = '';
        });

        document.getElementById('sort-name').addEventListener('click', function() {
            products.sort(function(a, b) {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();
                
                if (nameA < nameB) return sortAscending ? -1 : 1;
                if (nameA > nameB) return sortAscending ? 1 : -1;
                return 0;
            });

            this.innerText = sortAscending ? 'Tên sản phẩm ' : 'Tên sản phẩm ';
            
            sortAscending = !sortAscending; 

            renderTable();
        });
    </script>
</body>
</html>
